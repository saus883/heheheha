<!DOCTYPE html>
<html>
  <head>
    <title>Hoshi</title>

    <style>
      .large-container {
        display: flex;
        justify-content: center;
        height: 400px;
        padding-left: 150px;
        padding-right: 150px;
      }

      .column {
        flex: 1;
        margin-left: 10px;
        margin-right: 10px;
      }

      .image {
        display: flex;
        justify-content: center;
      }

      .profile{
        height: 200px;
        border-radius: 100px;
      }

      .description {
        text-align: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        padding-top: 5px;
      }

    </style>
  </head>
  <body>
    <div class="large-container">
      <div class="column">
        <div class="image">
          <img class="profile" src="picture-1.png">
        </div>
        <div class="description">
          Hoshi
        </div>
      </div>
      <div class="column">
        <div class="image">
          <img class="profile" src="picture 2.png">
        </div>
        <div class="description">
          Kegan
        </div>
      </div>
      <div class="column">
        <div class="image">
          <img class="profile" src="picture-3.png">
        </div>
        <div class="description">
          Gorvin
        </div>
      </div>
    </div>
  </body>
</html>
